services:
  postgres:
    image: postgres:16
    container_name: alisho-library-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: alisho_library
      POSTGRES_USER: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "55433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
